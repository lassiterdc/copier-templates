site_name: "[[project_name]]"
site_description: "[[description]]"
site_author: "[[author_name]]"
repo_url: "https://github.com/[[github_username]]/[[project_slug]]"

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
  palette:
    - scheme: default

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Tutorials:
      - tutorials/index.md
      - Getting started: tutorials/getting-started.md
  - How-to guides:
      - how-to/index.md
      - Installation: how-to/installation.md
  - Reference:
      - reference/index.md
      - API Reference: reference/api.md
  - Explanation:
      - explanation/index.md
